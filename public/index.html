<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowDB — Growtopia Item Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0c10;
      --surface:  #111520;
      --card:     #161b28;
      --border:   #1e2638;
      --accent:   #4ade80;
      --accent2:  #22d3ee;
      --warn:     #facc15;
      --red:      #f87171;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --pixel:    'Pixelify Sans', monospace;
      --mono:     'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(120px); opacity: 0.12; pointer-events: none; z-index: 0;
    }
    .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -200px; right: -100px; }

    /* ── Layout ── */
    #app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 3rem 0 2.5rem;
      animation: fadeDown .6s ease both;
    }
    .logo-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 999px; padding: .35rem 1rem .35rem .5rem;
      font-size: .7rem; color: var(--muted); margin-bottom: 1.5rem;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .logo-badge span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: block; animation: pulse 2s infinite; }
    h1 {
      font-family: var(--pixel);
      font-size: clamp(2.5rem, 7vw, 4rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .75rem;
    }
    .subtitle { color: var(--muted); font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; }

    /* ── Search bar ── */
    .search-wrap {
      position: relative; max-width: 580px; margin: 2.5rem auto 0;
      animation: fadeUp .6s .15s ease both;
    }
    .search-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 1.1rem;
    }
    #searchInput {
      width: 100%; padding: .9rem 3.5rem .9rem 3rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: var(--mono); font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,222,128,.12);
    }
    #clearBtn {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; display: none; padding: .2rem;
      transition: color .2s;
    }
    #clearBtn:hover { color: var(--text); }

    /* ── Suggestions dropdown ── */
    #suggestions {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 50;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      display: none;
    }
    .sug-item {
      padding: .7rem 1rem; cursor: pointer; font-size: .85rem;
      border-bottom: 1px solid var(--border);
      transition: background .15s; display: flex; align-items: center; gap: .6rem;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover, .sug-item.active { background: var(--border); }
    .sug-item .sug-icon { color: var(--muted); font-size: .8rem; }

    /* ── States ── */
    #status {
      text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: .85rem;
      animation: fadeUp .4s ease both;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 1rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }

    /* ── Item card ── */
    #itemCard {
      margin-top: 2.5rem;
      animation: fadeUp .4s ease both;
    }
    .card-header-row {
      display: flex; align-items: flex-start; gap: 1.5rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; padding: 1.5rem;
      border-bottom: none;
    }
    .sprite-box {
      width: 96px; height: 96px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      image-rendering: pixelated; overflow: hidden;
    }
    .sprite-box img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
    .sprite-box .no-img { color: var(--muted); font-size: 2rem; }

    .item-meta { flex: 1; min-width: 0; }
    .item-title {
      font-family: var(--pixel); font-size: 1.8rem; font-weight: 700;
      color: var(--text); line-height: 1.1; margin-bottom: .4rem;
    }
    .item-desc { color: var(--muted); font-size: .8rem; line-height: 1.6; margin-bottom: .75rem; font-style: italic; }
    .tag-row { display: flex; flex-wrap: wrap; gap: .4rem; }
    .tag {
      font-size: .7rem; padding: .2rem .6rem; border-radius: 999px;
      border: 1px solid; font-family: var(--mono); letter-spacing: .05em;
      text-transform: uppercase;
    }
    .tag-rarity  { color: var(--warn);   border-color: rgba(250,204,21,.3);  background: rgba(250,204,21,.06); }
    .tag-type    { color: var(--accent2); border-color: rgba(34,211,238,.3); background: rgba(34,211,238,.06); }
    .tag-chi     { color: #c084fc;        border-color: rgba(192,132,252,.3); background: rgba(192,132,252,.06); }
    .tag-prop    { color: var(--accent);  border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.06); }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-top: none;
    }
    .stat-cell {
      background: var(--card); padding: 1rem 1.25rem;
    }
    .stat-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .3rem; }
    .stat-value { font-family: var(--pixel); font-size: 1rem; color: var(--text); }
    .stat-value.green { color: var(--accent); }
    .stat-value.cyan  { color: var(--accent2); }

    /* ── Hardness bar ── */
    .hardness-row { display: flex; gap: .5rem; align-items: center; }
    .hard-bar { height: 6px; background: var(--border); border-radius: 3px; flex: 1; overflow: hidden; }
    .hard-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .6s ease; }
    .hard-num  { font-family: var(--pixel); font-size: .9rem; min-width: 2ch; color: var(--accent); }

    /* ── Sprites row ── */
    .sprites-section {
      background: var(--card); border: 1px solid var(--border);
      border-top: none; padding: 1.25rem; display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .sprite-thumb { text-align: center; }
    .sprite-thumb img {
      width: 64px; height: 64px; object-fit: contain; image-rendering: pixelated;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: block;
    }
    .sprite-thumb span { font-size: .65rem; color: var(--muted); margin-top: .3rem; display: block; text-transform: uppercase; letter-spacing: .08em; }

    /* ── Recipes ── */
    .recipes-section {
      background: var(--card); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 16px 16px; padding: 1.25rem;
    }
    .section-title { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: .75rem; }
    .recipe-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
    .recipe-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: .3rem .8rem; font-size: .8rem;
      color: var(--accent2); cursor: pointer; transition: all .15s;
    }
    .recipe-chip:hover { border-color: var(--accent2); background: rgba(34,211,238,.08); }

    /* ── Wiki link ── */
    .wiki-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--muted); font-size: .75rem; text-decoration: none;
      transition: color .2s; margin-top: 1.5rem;
    }
    .wiki-link:hover { color: var(--accent); }

    /* ── Footer ── */
    footer {
      text-align: center; margin-top: 4rem;
      color: var(--muted); font-size: .7rem; line-height: 1.8;
      border-top: 1px solid var(--border); padding-top: 1.5rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(12px);  } to { opacity:1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .card-header-row { flex-direction: column; align-items: center; text-align: center; }
      .tag-row { justify-content: center; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div id="app">
    <header>
      <div class="logo-badge"><span></span> Live Wiki Data</div>
      <h1>GrowDB</h1>
      <p class="subtitle">Growtopia Item Database</p>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="searchInput" type="text" placeholder="Search item… e.g. Dirt, Magic Egg, Lava" autocomplete="off" spellcheck="false" />
        <button id="clearBtn" title="Clear">✕</button>
        <div id="suggestions"></div>
      </div>
    </header>

    <div id="status">
      <div class="empty-icon">🌱</div>
      <div>Type an item name to get started</div>
    </div>

    <div id="itemCard" style="display:none"></div>

    <footer>
      Data sourced from <a href="https://growtopia.fandom.com" target="_blank" rel="noopener">growtopia.fandom.com</a>
      &nbsp;·&nbsp; Not affiliated with Ubisoft or Growtopia
      <br/>
      Built with ♥ using Python + Vercel
    </footer>
  </div>

  <script>
    // ─── Config ───────────────────────────────────────────────────────────────
    // On Vercel these will be the same-origin API routes.
    // For local dev (open index.html directly), point to your Vercel preview URL:
    const API_BASE = '';  // leave empty for same-origin Vercel deploy

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const searchInput  = document.getElementById('searchInput');
    const clearBtn     = document.getElementById('clearBtn');
    const suggestionsEl= document.getElementById('suggestions');
    const statusEl     = document.getElementById('status');
    const itemCardEl   = document.getElementById('itemCard');

    // ─── State ────────────────────────────────────────────────────────────────
    let sugItems = [];
    let activeSug = -1;
    let searchTimer = null;
    let lastQuery = '';

    // ─── Search input handler ─────────────────────────────────────────────────
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      clearBtn.style.display = q ? 'block' : 'none';
      if (!q) { hideSuggestions(); return; }
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => fetchSuggestions(q), 280);
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.style.display = 'none';
      hideSuggestions();
      showEmpty();
      searchInput.focus();
    });

    // ─── Keyboard navigation ──────────────────────────────────────────────────
    searchInput.addEventListener('keydown', e => {
      if (!suggestionsEl.style.display || suggestionsEl.style.display === 'none') {
        if (e.key === 'Enter') fetchItem(searchInput.value.trim());
        return;
      }
      if (e.key === 'ArrowDown') { e.preventDefault(); moveSug(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); moveSug(-1); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeSug >= 0 && sugItems[activeSug]) fetchItem(sugItems[activeSug]);
        else fetchItem(searchInput.value.trim());
      }
      else if (e.key === 'Escape') hideSuggestions();
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) hideSuggestions();
    });

    function moveSug(dir) {
      activeSug = Math.max(-1, Math.min(sugItems.length - 1, activeSug + dir));
      renderSugHighlight();
    }

    // ─── Suggestions ──────────────────────────────────────────────────────────
    async function fetchSuggestions(q) {
      if (q === lastQuery) return;
      lastQuery = q;
      try {
        const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        sugItems = (data.results || []).map(r => r.Title).slice(0, 8);
        activeSug = -1;
        renderSuggestions();
      } catch { hideSuggestions(); }
    }

    function renderSuggestions() {
      if (!sugItems.length) { hideSuggestions(); return; }
      suggestionsEl.innerHTML = sugItems.map((t, i) =>
        `<div class="sug-item" data-i="${i}">
          <span class="sug-icon">▶</span>${escapeHtml(t)}
        </div>`
      ).join('');
      suggestionsEl.querySelectorAll('.sug-item').forEach(el => {
        el.addEventListener('click', () => { fetchItem(sugItems[+el.dataset.i]); });
        el.addEventListener('mouseenter', () => { activeSug = +el.dataset.i; renderSugHighlight(); });
      });
      suggestionsEl.style.display = 'block';
    }

    function renderSugHighlight() {
      suggestionsEl.querySelectorAll('.sug-item').forEach((el, i) => {
        el.classList.toggle('active', i === activeSug);
      });
    }

    function hideSuggestions() {
      suggestionsEl.style.display = 'none';
      sugItems = [];
      activeSug = -1;
    }

    // ─── Item fetch ───────────────────────────────────────────────────────────
    async function fetchItem(name) {
      if (!name) return;
      searchInput.value = name;
      hideSuggestions();
      showLoading(name);

      try {
        const res = await fetch(`${API_BASE}/api/item?name=${encodeURIComponent(name)}`);
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        renderItem(data);
      } catch (e) {
        showError('Network error — check your connection.');
      }
    }

    // ─── Render item ──────────────────────────────────────────────────────────
    function renderItem(d) {
      statusEl.style.display = 'none';
      itemCardEl.style.display = 'block';

      const sprite = d.Sprite || {};
      const hardness = d.Hardness || {};
      const maxH = 200;

      const typeStr  = Array.isArray(d.Type) ? d.Type.join(' / ') : (d.Type || '—');
      const chiStr   = d.Chi || '—';
      const props    = (d.Properties || []).filter(Boolean);
      const recipes  = d.Recipe || [];
      const seeds    = Array.isArray(d.SeedColor) ? d.SeedColor.join(', ') : (d.SeedColor || '—');

      itemCardEl.innerHTML = `
        <div class="card-header-row">
          <div class="sprite-box">
            ${sprite.Item
              ? `<img src="${sprite.Item}" alt="${escapeHtml(d.Title)}" />`
              : `<span class="no-img">🌿</span>`}
          </div>
          <div class="item-meta">
            <div class="item-title">${escapeHtml(d.Title || '?')}</div>
            <div class="item-desc">${escapeHtml(d.Description || '')}</div>
            <div class="tag-row">
              ${d.Rarity !== undefined && d.Rarity !== 'None' ? `<span class="tag tag-rarity">⭐ Rarity ${d.Rarity}</span>` : ''}
              ${typeStr !== '—' ? `<span class="tag tag-type">${escapeHtml(typeStr)}</span>` : ''}
              ${chiStr !== '—' ? `<span class="tag tag-chi">✦ ${escapeHtml(chiStr)}</span>` : ''}
              ${props.map(p => `<span class="tag tag-prop">${escapeHtml(p.trim())}</span>`).join('')}
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-cell">
            <div class="stat-label">Texture Type</div>
            <div class="stat-value cyan">${escapeHtml(d.TextureType || '—')}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Collision</div>
            <div class="stat-value">${escapeHtml(d.CollisionType || '—')}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Grow Time</div>
            <div class="stat-value green">${escapeHtml(d.GrowTime || '—')}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Gems Drop</div>
            <div class="stat-value">${escapeHtml(d.DefaultGemsDrop || '—')}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Seed Color</div>
            <div class="stat-value">${escapeHtml(seeds)}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Hardness</div>
            <div>
              ${hardness.Fist !== null && hardness.Fist !== undefined ? `
                <div class="stat-label" style="margin-top:.4rem">Fist</div>
                <div class="hardness-row">
                  <div class="hard-bar"><div class="hard-fill" style="width:${Math.min(100, hardness.Fist / maxH * 100)}%"></div></div>
                  <span class="hard-num">${hardness.Fist}</span>
                </div>` : ''}
              ${hardness.Pickaxe !== null && hardness.Pickaxe !== undefined ? `
                <div class="stat-label" style="margin-top:.4rem">Pickaxe</div>
                <div class="hardness-row">
                  <div class="hard-bar"><div class="hard-fill" style="width:${Math.min(100, hardness.Pickaxe / maxH * 100)}%;background:var(--accent2)"></div></div>
                  <span class="hard-num" style="color:var(--accent2)">${hardness.Pickaxe}</span>
                </div>` : ''}
            </div>
          </div>
        </div>

        ${sprite.Item || sprite.Tree || sprite.Seed ? `
        <div class="sprites-section">
          ${sprite.Item  ? `<div class="sprite-thumb"><img src="${sprite.Item}"  alt="Item"  /><span>Item</span></div>` : ''}
          ${sprite.Tree  ? `<div class="sprite-thumb"><img src="${sprite.Tree}"  alt="Tree"  /><span>Tree</span></div>` : ''}
          ${sprite.Seed  ? `<div class="sprite-thumb"><img src="${sprite.Seed}"  alt="Seed"  /><span>Seed</span></div>` : ''}
        </div>` : ''}

        <div class="recipes-section">
          ${recipes.length ? `
            <div class="section-title">Recipes (${recipes.length})</div>
            <div class="recipe-chips">
              ${recipes.map(r => `<span class="recipe-chip">${escapeHtml(r)}</span>`).join('')}
            </div>` : `<div class="section-title" style="margin:0">No recipes found</div>`}
          <a class="wiki-link" href="${d.Url}" target="_blank" rel="noopener">
            ↗ View on Growtopia Wiki
          </a>
        </div>
      `;

      // Make recipe chips searchable
      itemCardEl.querySelectorAll('.recipe-chip').forEach(chip => {
        chip.addEventListener('click', () => fetchItem(chip.textContent.trim()));
      });
    }

    // ─── UI states ────────────────────────────────────────────────────────────
    function showLoading(name) {
      itemCardEl.style.display = 'none';
      statusEl.style.display = 'block';
      statusEl.innerHTML = `
        <div class="spinner"></div>
        <div>Fetching <strong style="color:var(--accent)">${escapeHtml(name)}</strong>...</div>
      `;
    }
    function showError(msg) {
      itemCardEl.style.display = 'none';
      statusEl.style.display = 'block';
      statusEl.innerHTML = `
        <div class="empty-icon">⚠️</div>
        <div style="color:var(--red)">${escapeHtml(msg)}</div>
      `;
    }
    function showEmpty() {
      itemCardEl.style.display = 'none';
      statusEl.style.display = 'block';
      statusEl.innerHTML = `
        <div class="empty-icon">🌱</div>
        <div>Type an item name to get started</div>
      `;
    }

    // ─── Utils ────────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── URL param auto-search ────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const preload = urlParams.get('item');
    if (preload) { searchInput.value = preload; clearBtn.style.display = 'block'; fetchItem(preload); }
  </script>
</body>
</html>
